{% extends "layout.html" %}

{% block content %}
<section class="content-header px-1">
    <div class="container-fluid">
        <h1>{{ "Edit FAQ Document" if faq else "Create FAQ Document" }}</h1>
        <hr>
    </div>
</section>

<section class="content">
    <div class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-lg-12">

                <!-- FAQ JSON Data for Prefill -->
                <script id="faq-data" type="application/json">
                    {{ faq | tojson }}
                </script>

                <form id="faq-form"
                      method="post"
                      action="{% if faq %}{{ url_for('faq_update', faq_id=faq.id) }}{% else %}{{ url_for('faq_create') }}{% endif %}"
                      class="shadow-sm p-4 rounded bg-white border">

                    <div class="row">

                        <!-- Title -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">
                                Title <span class="text-danger">*</span>
                            </label>
                            <input type="text"
                                   name="title"
                                   class="form-control"
                                   placeholder="Enter FAQ title"
                                   value="{{ faq.title if faq else '' }}"
                                   required>
                        </div>

                        <!-- Status -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold d-block">
                                Status
                            </label>
                            <div class="form-check form-switch mt-2">
                                <input type="hidden" name="is_active" value="false">
                                <input class="form-check-input large-switch"
                                    type="checkbox"
                                    role="switch"
                                    id="statusSwitch"
                                    name="is_active"
                                    value="true"
                                    {% if faq and faq.is_active %}checked{% endif %}
                                    {% if not faq %}checked{% endif %}>
                                <label class="mx-2 form-check-label fw-medium" for="statusSwitch">
                                    Active
                                </label>
                            </div>
                        </div>

                        <!-- Content / Rich Text -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Answer</label>
                                <div id="content-editor" style="height: 250px;"></div>
                                <input type="hidden" name="content" id="content">
                            </div>

                    </div>

                    <div class="page-bottom-action-btn mt-4">
                        <button type="submit" class="btn btn-submit">
                            {{ "Update" if faq else "Create" }}
                        </button>

                        <a href="{{ url_for('faq_list') }}"
                           class="btn btn-cancel ms-2">
                            Cancel
                        </a>
                    </div>

                </form>

            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<!-- ✅ Safe JSON Data -->
<script id="faq-data" type="application/json">
    {{ faq | default({}) | tojson }}
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // ✅ Initialize Quill
    const quill = new Quill('#content-editor', {
        theme: 'snow',
        placeholder: 'Write FAQ answer here...',
        modules: {
            toolbar: [
                [{ header: [1, 2, false] }],
                ['bold', 'italic', 'underline'],
                ['link', 'blockquote', 'code-block'],
                [{ list: 'ordered'}, { list: 'bullet' }],
                ['clean']
            ]
        }
    });

    // ✅ Safely load existing FAQ data
    const faqElement = document.getElementById("faq-data");
    let faqData = {};

    if (faqElement && faqElement.textContent.trim() !== "") {
        try {
            faqData = JSON.parse(faqElement.textContent);
        } catch (e) {
            console.error("Invalid FAQ JSON:", e);
        }
    }

    // ✅ Prefill content if editing
    if (faqData && faqData.content) {
        quill.root.innerHTML = faqData.content;
    }

    // ✅ On form submit, copy HTML into hidden input
    const form = document.getElementById("faq-form");
    form.addEventListener("submit", function () {
        document.getElementById("content").value = quill.root.innerHTML;
    });

});
</script>
{% endblock %}
